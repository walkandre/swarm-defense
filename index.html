<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#14161c">
<title>Swarm Defense</title>
<style>
  :root {
    --bg: #14161c;
    --panel: #1d212b;
    --panel2: #262b38;
    --text: #d8dee9;
    --dim: #8a93a6;
    --accent: #4fc3f7;
    --gold: #ffd166;
    --danger: #ef476f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }
  #app {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  #hud {
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 8px 16px;
    background: var(--panel);
    border-bottom: 1px solid #000;
    user-select: none;
    flex-wrap: wrap;
  }
  .stat { font-size: 15px; font-weight: 600; white-space: nowrap; }
  .stat span { color: var(--dim); font-weight: 400; margin-right: 4px; }
  #gold-val { color: var(--gold); }
  #lives-val { color: var(--danger); }
  #wave-val { color: var(--accent); }
  .spacer { flex: 1; }
  button {
    background: var(--panel2);
    color: var(--text);
    border: 1px solid #3a4254;
    border-radius: 6px;
    padding: 6px 14px;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
  }
  button:hover { background: #313a4d; border-color: var(--accent); }
  button:disabled { opacity: 0.4; cursor: default; }
  /* Hamburger menu: a toggle button and a dropdown that floats below it. */
  #menu { position: relative; }
  #menu-btn { font-size: 18px; line-height: 1; padding: 5px 12px; }
  #menu-list {
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 6px;
    display: none;
    flex-direction: column;
    gap: 4px;
    padding: 6px;
    background: var(--panel);
    border: 1px solid #3a4254;
    border-radius: 8px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.55);
    z-index: 10;
  }
  #menu.open #menu-list { display: flex; }
  #menu-list button { width: 100%; text-align: left; white-space: nowrap; }
  /* Tower selection floats over the bottom of the map, horizontally centered. */
  #shop {
    position: absolute;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    padding: 8px;
    background: rgba(29, 33, 43, 0.85);
    border: 1px solid #3a4254;
    border-radius: 10px;
    box-shadow: 0 4px 16px rgba(0, 0, 0, 0.4);
    pointer-events: auto;
    z-index: 2;
  }
  .tower-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    min-width: 86px;
    padding: 5px 10px;
    line-height: 1.2;
  }
  .tower-btn small { color: var(--gold); font-size: 12px; }
  .tower-btn .key { color: var(--dim); font-size: 10px; }
  .tower-btn.selected { border-color: var(--accent); background: #2a3a4d; box-shadow: 0 0 8px rgba(79,195,247,0.35); }
  .tower-btn.unaffordable small { color: var(--danger); }
  .tower-btn .adv { color: var(--accent); font-size: 9px; opacity: 0.85; }
  /* A slot wraps a base tower button and its advanced-variant popover. */
  .tower-slot { position: relative; display: flex; }
  .tower-pop {
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    margin-bottom: 10px;
    display: none;
    flex-direction: column;
    gap: 4px;
    width: 230px;
    padding: 6px;
    background: rgba(29, 33, 43, 0.97);
    border: 1px solid #3a4254;
    border-radius: 10px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.55);
    z-index: 5;
  }
  /* Invisible bridge over the gap so moving from button to popover keeps hover. */
  .tower-pop::after {
    content: "";
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    height: 12px;
  }
  .tower-slot:hover .tower-pop { display: flex; }
  .variant-btn {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    gap: 1px 8px;
    text-align: left;
    padding: 6px 9px;
    line-height: 1.3;
  }
  .variant-btn small { color: var(--gold); font-size: 12px; }
  .variant-btn i { grid-column: 1 / -1; color: var(--dim); font-size: 11px; font-style: normal; }
  .variant-btn.selected { border-color: var(--accent); background: #2a3a4d; }
  .variant-btn.unaffordable small { color: var(--danger); }
  #start-wave { border-color: var(--accent); font-weight: 600; }
  #canvas-wrap {
    flex: 1;
    min-height: 0;
    overflow: hidden;
    position: relative;
    background: #181b22;
  }
  /* Three stacked layers: WebGL world, 2D world, and the always-on-top HUD
     overlay. Only the overlay receives pointer events; the world canvases are
     transparent so whichever one is hidden lets the backdrop show through. */
  canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    pointer-events: none;
  }
  #overlay { pointer-events: auto; }

  /* ---- Mobile / touch optimizations ---- */
  @media (max-width: 640px) {
    #hud {
      padding: 10px 12px;
      gap: 10px;
    }
    .stat { font-size: 17px; }
    button {
      padding: 10px 16px;
      font-size: 15px;
      min-height: 44px;
    }
    #menu-btn { font-size: 22px; padding: 8px 14px; min-height: 44px; }
    .tower-btn {
      min-width: 64px;
      padding: 8px 6px;
      gap: 3px;
    }
    .tower-btn small { font-size: 13px; }
    .tower-btn b { font-size: 13px; }
    #shop {
      gap: 6px;
      padding: 8px 6px;
      max-width: calc(100vw - 16px);
      overflow-x: auto;
    }
    .tower-pop { width: 200px; }
    .variant-btn { padding: 10px 9px; }
  }

  /* Touch-device popovers: toggled by JS class instead of :hover */
  @media (hover: none) {
    .tower-slot:hover .tower-pop { display: none; }
    .tower-slot.pop-open .tower-pop { display: flex; }
    .tower-btn .key { display: none; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="stat"><span>Gold</span><b id="gold-val">0</b></div>
    <div class="stat"><span>Lives</span><b id="lives-val">0</b></div>
    <div class="stat"><span>Wave</span><b id="wave-val">0</b></div>
    <div class="spacer"></div>
    <button id="start-wave">Start Wave</button>
    <div id="menu">
      <button id="menu-btn" title="Menu" aria-haspopup="true" aria-expanded="false">&#9776;</button>
      <div id="menu-list">
        <button id="day-btn" title="Time of day — t cycles, Shift+T auto"></button>
        <button id="new-map">New Map</button>
        <button id="swap-tiles" title="Swap tileset (default / space)">Swap Tiles</button>
      </div>
    </div>
  </div>
  <div id="canvas-wrap">
    <canvas id="game-gl"></canvas>
    <canvas id="game"></canvas>
    <canvas id="overlay"></canvas>
    <div id="shop"></div>
  </div>
</div>
<!-- Optional debug GUI; the game guards on its presence, so it's fine offline. -->
<script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19/dist/lil-gui.umd.min.js"></script>
<script src="js/util.js"></script>
<script src="js/tiles.js"></script>
<script src="js/renderer.js"></script>
<script src="js/map.js"></script>
<script src="js/enemies.js"></script>
<script src="js/towers.js"></script>
<script src="js/game.js"></script>
</body>
</html>
